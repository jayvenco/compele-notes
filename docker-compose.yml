# ─────────────────────────────────────────────────────
#  Notes App — production / Unraid deployment
# ─────────────────────────────────────────────────────
#
# Installeren via terminal (Unraid of elke Docker host):
#
#   export GITHUB_USER=jouw-github-gebruikersnaam
#   docker compose -f https://raw.githubusercontent.com/$GITHUB_USER/compele-notes/main/docker-compose.yml up -d
#
# Of download de compose en maak een .env aan (zie .env.example):
#
#   curl -O https://raw.githubusercontent.com/GITHUB_USER/compele-notes/main/docker-compose.yml
#   curl -O https://raw.githubusercontent.com/GITHUB_USER/compele-notes/main/.env.example
#   mv .env.example .env   # pas GITHUB_USER aan in .env
#   docker compose up -d
#
# Portainer (Unraid): Stacks → Add Stack → Repository → vul repo URL in
# ─────────────────────────────────────────────────────

services:
  backend:
    image: ghcr.io/${GITHUB_USER}/compele-notes-backend:${NOTES_TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=4000
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/uploads
    volumes:
      - ${NOTES_DATA:-notes-data}:/app/data
      - ${NOTES_UPLOADS:-notes-uploads}:/app/uploads
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/${GITHUB_USER}/compele-notes-frontend:${NOTES_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NOTES_PORT:-8080}:80"

volumes:
  notes-data:
  notes-uploads:
