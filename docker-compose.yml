# ─────────────────────────────────────────────────────
#  Compele Notes — productie / Unraid deployment
# ─────────────────────────────────────────────────────
#
# Installeren:
#
#   curl -O https://raw.githubusercontent.com/GITHUB_USER/compele-notes/main/docker-compose.yml
#   echo "GITHUB_USER=jayvenco\nNOTES_PORT=3737" > .env
#   docker compose up -d
#
# ─────────────────────────────────────────────────────

services:
  app:
    image: ghcr.io/${GITHUB_USER}/compele-notes:${NOTES_TAG:-latest}
    restart: unless-stopped
    environment:
      - PORT=3737
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/uploads
    volumes:
      - ${NOTES_DATA:-notes-data}:/app/data
      - ${NOTES_UPLOADS:-notes-uploads}:/app/uploads
    ports:
      - "${NOTES_PORT:-3737}:3737"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3737/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  notes-data:
  notes-uploads:
